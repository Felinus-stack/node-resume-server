<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>个人简历</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        line-height: 1.6;
      }
      h1 {
        color: #333;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      h2 {
        color: #555;
        margin: 20px 0 10px;
        font-size: 20px;
      }
      p,
      li {
        color: #666;
        font-size: 16px;
      }
      .info {
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <h1>个人简历</h1>

    <div class="info">
      <p>姓名：XXX</p>
      <p>岗位：前端/后端开发实习生</p>
      <p>技能：HTML、CSS、JavaScript、Node.js、Git</p>
    </div>

    <h2>教育经历</h2>
    <p>XX中学 / XX专业</p>

    <h2>项目经历</h2>
    <ul>
      <li>成绩格式化工具：Node.js 自动化处理成绩单，生成评价报告</li>
      <li>局域网简历网站：搭建Web服务器，实现内网访问个人简历</li>
    </ul>

    <h2>自我评价</h2>
    <p>热爱编程，学习能力强，熟悉基础前后端开发，善于动手实践。</p>
  </body>
</html>
